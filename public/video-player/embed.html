<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="theme-color" content="#d4d0c9" />
    <title>Tesil Video Player Embed</title>
    <script src="theme-init.js?v=embed-chrome-dismiss-20260429"></script>
    <link rel="stylesheet" href="styles.css?v=embed-chrome-dismiss-20260429" />
  </head>
  <body class="page--embed-host">
    <main class="page page--embed">
      <!-- Hidden loader controls kept for script compatibility; only player UI is visible. -->
      <input
        type="file"
        id="fileInput"
        class="upload-row__input"
        accept="video/*"
        aria-hidden="true"
        tabindex="-1"
        hidden
      />
      <span id="fileName" aria-hidden="true" hidden></span>
      <input
        type="url"
        id="urlInput"
        class="url-row__input"
        aria-hidden="true"
        tabindex="-1"
        hidden
      />
      <button type="button" id="loadUrlBtn" aria-hidden="true" tabindex="-1" hidden>
        Load URL
      </button>

      <div class="player" id="player" data-state="paused" data-source="native">
        <div class="player__viewport" id="videoViewport">
          <div class="player__zoom-layer" id="zoomLayer">
            <video
              id="video"
              class="player__video"
              playsinline
              preload="auto"
              draggable="false"
            >
              Your browser does not support HTML5 video.
            </video>
            <button type="button" id="hlsStatus" class="player__hls-status" hidden></button>
            <div id="ytMount" class="player__yt-mount" hidden></div>
          </div>
        </div>

        <video
          id="previewVideo"
          class="player__preview-src"
          muted
          playsinline
          preload="metadata"
          tabindex="-1"
          aria-hidden="true"
        ></video>

        <div class="player__corner-volume player__hud">
          <div class="player__volume">
            <button
              type="button"
              class="player__btn player__volume-mute"
              id="mute"
              aria-label="Mute"
              data-tooltip="Mute (M)"
            >
              <span class="icon-volume" aria-hidden="true">
                <svg class="icon-volume__svg icon-volume__svg--on" viewBox="0 0 24 24" width="18" height="18">
                  <path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3z" />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    d="M16 9.5a3.5 3.5 0 0 1 0 5M18.5 7a6 6 0 0 1 0 10"
                  />
                </svg>
                <svg class="icon-volume__svg icon-volume__svg--off" viewBox="0 0 24 24" width="18" height="18">
                  <path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3z" />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    d="M14.5 9l8 8M22.5 9l-8 8"
                  />
                </svg>
              </span>
            </button>
            <div class="player__volume-slider-rail">
              <input
                type="range"
                class="player__volume-slider"
                id="volume"
                min="0"
                max="1"
                value="1"
                step="0.05"
                aria-label="Volume"
              />
            </div>
          </div>
        </div>

        <div class="player__corner-tools player__hud">
          <span class="player__zoom-group" id="zoomGroup">
            <button
              type="button"
              class="player__btn"
              id="zoomOut"
              aria-label="Zoom out"
              data-tooltip="Zoom out (−)"
            >
              −
            </button>
            <button
              type="button"
              class="player__btn player__btn--zoom-reset"
              id="zoomReset"
              aria-label="Reset zoom"
              data-tooltip="Reset zoom (0)"
            >
              <span id="zoomLabel">100%</span>
            </button>
            <button
              type="button"
              class="player__btn"
              id="zoomIn"
              aria-label="Zoom in"
              data-tooltip="Zoom in (+)"
            >
              +
            </button>
          </span>

          <div class="player__rate">
            <button
              type="button"
              class="player__btn"
              id="rateDown"
              aria-label="Slower"
              data-tooltip="Slower ([)"
            >
              −
            </button>
            <div class="player__rate-select-wrap" data-tooltip="Playback speed ([ / ])">
              <div class="player__dropdown" id="playbackRateDropdown">
                <div class="player__dropdown-pillWithNative" id="playbackRatePillHost">
                  <button
                    type="button"
                    class="player__dropdown-trigger"
                    id="playbackRateTrigger"
                    aria-label="Playback speed"
                    aria-haspopup="listbox"
                    aria-expanded="false"
                    aria-controls="playbackRatePanel"
                  >
                    <span id="playbackRateLabel">1×</span>
                  </button>
                  <select
                    id="playbackRateNative"
                    class="player__select-overlay-native"
                    aria-label="Playback speed"
                    tabindex="0"
                  >
                    <option value="0.25">0.25×</option>
                    <option value="0.5">0.5×</option>
                    <option value="0.75">0.75×</option>
                    <option value="1" selected>1×</option>
                    <option value="1.25">1.25×</option>
                    <option value="1.5">1.5×</option>
                    <option value="1.75">1.75×</option>
                    <option value="2">2×</option>
                    <option value="2.5">2.5×</option>
                    <option value="3">3×</option>
                  </select>
                </div>
                <div
                  class="player__dropdown-panel"
                  id="playbackRatePanel"
                  role="listbox"
                  hidden
                ></div>
              </div>
            </div>
            <button
              type="button"
              class="player__btn"
              id="rateUp"
              aria-label="Faster"
              data-tooltip="Faster (])"
            >
              +
            </button>
          </div>

          <div class="player__quality" id="qualityWrap" hidden>
            <div class="player__quality-select-wrap" data-tooltip="Quality">
              <div class="player__dropdown" id="qualityDropdown">
                <div class="player__dropdown-pillWithNative" id="qualityPillHost">
                  <button
                    type="button"
                    class="player__dropdown-trigger"
                    id="qualityTrigger"
                    aria-label="Quality"
                    aria-haspopup="listbox"
                    aria-expanded="false"
                    aria-controls="qualityPanel"
                  >
                    <span id="qualityLabel">—</span>
                  </button>
                  <select
                    id="qualitySelectNative"
                    class="player__select-overlay-native"
                    aria-label="Quality"
                    tabindex="0"
                    hidden
                  ></select>
                </div>
                <div
                  class="player__dropdown-panel"
                  id="qualityPanel"
                  role="listbox"
                  hidden
                ></div>
              </div>
            </div>
          </div>
        </div>

        <div class="player__chrome player__hud">
          <div class="player__progress-wrap">
            <div class="player__scrub-preview" id="scrubPreview" hidden>
              <canvas
                id="previewCanvas"
                class="player__scrub-preview-canvas"
                width="160"
                height="90"
              ></canvas>
              <span class="player__scrub-preview-time" id="previewTime"></span>
            </div>
            <div class="player__progress-rail" aria-hidden="true">
              <div class="player__progress-rail__fill"></div>
            </div>
            <input
              type="range"
              class="player__progress"
              id="progress"
              min="0"
              max="1000"
              value="0"
              step="1"
              aria-label="Seek"
            />
          </div>

          <div class="player__bar">
            <button
              type="button"
              class="player__btn player__btn--square"
              id="playPause"
              aria-label="Play"
              data-tooltip="Play (Space)"
            >
              <span class="icon-play" aria-hidden="true"></span>
            </button>

            <div class="player__time-group" id="timeGroup">
              <button
                type="button"
                class="player__btn player__btn--frame"
                id="frameBack"
                aria-label="Previous frame"
                data-tooltip="Previous frame (,)"
              >
                <svg class="icon-frame-arrow" viewBox="0 0 24 24" width="11" height="11" aria-hidden="true">
                  <path fill="currentColor" d="M17 5L7 12l10 7V5z" />
                </svg>
              </button>
              <span class="player__time" id="timeDisplay">0:00 / 0:00</span>
              <button
                type="button"
                class="player__btn player__btn--frame"
                id="frameForward"
                aria-label="Next frame"
                data-tooltip="Next frame (.)"
              >
                <svg class="icon-frame-arrow" viewBox="0 0 24 24" width="11" height="11" aria-hidden="true">
                  <path fill="currentColor" d="M7 5l10 7-10 7V5z" />
                </svg>
              </button>
            </div>

            <button
              type="button"
              class="player__btn player__btn--live"
              id="goLive"
              aria-label="Go to live"
              data-tooltip="Go to live"
              data-live-at="true"
              hidden
            >
              <span class="player__live-dot" aria-hidden="true"></span>
              <span class="player__live-label">LIVE</span>
            </button>

            <div class="player__spacer"></div>
          </div>

          <div class="player__bar-tools">
            <div class="player__windows-group">
              <button
                type="button"
                class="player__btn player__btn--square"
                id="pip"
                aria-label="Picture in Picture"
                data-tooltip="Picture-in-Picture"
              >
                <span class="icon-pip" aria-hidden="true">
                  <svg
                    class="icon-pip__svg"
                    viewBox="0 0 24 24"
                    width="14"
                    height="14"
                    fill="none"
                    aria-hidden="true"
                  >
                    <rect
                      x="2"
                      y="2"
                      width="20"
                      height="20"
                      rx="2.5"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linejoin="round"
                    />
                    <rect
                      x="12"
                      y="12"
                      width="7"
                      height="7"
                      rx="1.5"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linejoin="round"
                    />
                  </svg>
                </span>
              </button>
              <button
                type="button"
                class="player__btn player__btn--square"
                id="fullscreen"
                aria-label="Fullscreen"
                data-tooltip="Fullscreen (F)"
              >
                <span class="icon-fs" aria-hidden="true">
                  <svg class="icon-fs__svg" viewBox="0 0 24 24" width="14" height="14" fill="none" aria-hidden="true">
                    <polyline
                      points="15 3 21 3 21 9"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <polyline
                      points="9 21 3 21 3 15"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <polyline
                      points="21 15 21 21 15 21"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <polyline
                      points="3 9 3 3 9 3"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                </span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="tooltipLayer" class="tooltip-layer" role="tooltip" hidden></div>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.18/dist/hls.min.js"></script>
    <script src="player.js?v=embed-chrome-dismiss-20260429"></script>
  </body>
</html>
